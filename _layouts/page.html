---
layout: default
---

<section class="page">
  {% if page.show_title %}
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>
  {% endif %}

  <div class="page-content">
    {{ content }}
  </div>
</section>
